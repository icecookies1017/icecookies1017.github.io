# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: 雪餅的blog
subtitle: 這是我的個人部落格
description: 網站簡介
keywords:
author: 雪餅
language: zh-TW
timezone: Asia/Taipei

# URL
url: https://icecookies1017.github.io
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

meta_generator: true

# Date / Time format
date_format: YYYY年MM月DD日
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Search
search:
  path: search.xml
  field: post
  content: true

# Extensions
theme: nexmoe

# Deployment
deploy:
  type: ''
