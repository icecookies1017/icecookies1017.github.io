avatar: /images/123.png
background:
    path: /images/bg1.jpg
    width: 1280
    height: 726
favicon:
  href: /favicon.ico
  type: image/x-icon

function:
  globalToc: true
  wordCount: false
  copyCode: true

imageCDN:
  enable: false

customStyles:
  - custom.css

menu:
    回到首頁:
        - /
        - icon-home
    文章歸檔:
        - /archives
        - icon-container
    關於我:
        - /about
        - icon-info-circle
    我的朋友:
        - /PY

widgets:
    - name: search
      enable: true
      options:
        search:
            type: local
    - name: social
      enable: true
      options:
        social:
            GitHub:
                - https://github.com/icecookies1017
                - icon-github
                - rgb(25, 23, 23)
                - rgba(25, 23, 23, .1)
    - name: tagcloud
      enable: true
      options:
        maxTagcloud: 17
    - name: archive
      enable: true
      options:
        widgetAchive:
            archive_type: 'year'
            show_count: true
    - name: recent_posts
      enable: true

copyTip: false

slotComment: |
  <div class="giscus"></div>
  <script src="https://giscus.app/client.js"
          data-repo="icecookies1017/icecookies1017.github.io"
          data-repo-id="R_kgDOQ4Ivbw"
          data-category="Announcements"
          data-category-id="DIC_kwDOQ4Ivb84C53iI"
          data-mapping="pathname"
          data-strict="1"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="top"
          data-theme="light"
          data-lang="zh-TW"
          data-loading="lazy"
          crossorigin="anonymous"
          async>
  </script>

slotHead: |
  <script>(function(){var t=localStorage.getItem('theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';if(t==='dark')document.documentElement.classList.add('dark-mode')})()</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">

slotFooter: |
  <script src="/js/darkmode.js"></script>
  <script src="/js/search-overlay.js"></script>
  <script src="/js/sidebar-search.js"></script>

slotSidebar: |
  <br>這是我的個人部落格

slotCopyright: ""
